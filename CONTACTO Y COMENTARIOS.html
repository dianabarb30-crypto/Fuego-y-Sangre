<!DOCTYPE html>
<html>
    <head>
        <title>El Arte Chino</title>
          <link rel="stylesheet" href="css-style.css">
          <script src="js-script.js"></script>
          <link rel="icon" href="img\Logo 3.png">
    </head>
    <body>
        <header>
            <img class="marca" src="img\Logo 2.png" width="200px">
            <h1 align="center"><b><i>COMENTARIOS</i></b></h1>
        <div class="btn">
            <a href="index.html"><button><b>ARTE CHINO</b></button></a>
            <a href="PINTURA.html"><button><b>PINTURA</b></button></a>
            <a href="ARQUITECTURA.html"><button><b>ARQUITECTURA</b></button></a>
            <a href="ESCULTURA.html"><button><b>ESCULTURA</b></button></a>
            <a href="CONTACTO Y COMENTARIOS.html"><button><b>COMENTARIOS</b></button></a>
            </div>
        </header>
        <main>
               <fieldset>
            <legend>Regístrate y envía tus comentarios</legend>
            <form
            method="POST"
            action="https://script.google.com/macros/s/AKfycbx7ATdQno6Nugh0KUGIzQ2tV_y8dGJiR0P7der5nm1LuO7ibmGEtgugK4xX6XE8GWRF/exec"
            id="my-form">
                <label for="Name" class="Name">Nombre:</label><br>
                <input type="Name" class="Name" name="Name" id="Name" required><br>
                <br>

                <label for="Email" class="Email">Correo electrónico:</label><br>
                <input type="Email" class="Email" name="Email" id="Email" required><br>
                <br>
        
                <label for="Mensaje" class="mensaje">Comentario: </label><br>
                <textarea name="Mensaje" type="Mensaje" class="Mensaje" id="Mensaje" required></textarea><br>
                <br>
                <button type="submit"><b>Enviar</b></button>
                </fieldset>
            </form>
            <div class="galeria">
                <h2>Galería de imágenes</h2>
                <img id="ImagenPrincipal" 
                class="imagen-principal" src="" height="400">
                <div class="controles">
                    <button id="btnAnterior">ANTERIOR</button>
                    <button id="btnSiguiente">SIGUIENTE</button>
                </div>
            </div>
        </main>
        <footer>
            <div class="pie">
            <img class="logo" src="img\Logo.png" width="200px">
            <div class="textpie">
            Creado por: Diana Bárbara Ruiz<br>
            Contacto: dianamartinezr@cealasamericas.edu.mx<br>
            </div>
            </div>
        </footer>
    </body>
</html>
